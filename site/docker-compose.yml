services:

  # ── 1. MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: pairia-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commmerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. PHP / Apache ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
    container_name: pairia-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commmerce
    depends_on:
      db:
        condition: service_healthy

  # ── 3. Python / FastAPI ─────────────────────────────────────────────────────
  api:
    build:
      context: ./ia
    container_name: pairia-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ia:/app
      - qdrant_data:/app/qdrant_db
      - ./images:/app/images
      - modele_intention:/modele_intention
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commmerce
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: http://ollama:11434
      MODEL_DIR: /modele_intention
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # ── 4. Qdrant ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pairia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── 5. Ollama (LLM) ─────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: pairia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  # ── 6. phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pairia-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  qdrant_data:
  ollama_models:
  modele_intention:
  vendor: