services:

  # ── 1. MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: pairia-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commmerce
    ports:
      - "3306:3306"          # optionnel : accès depuis ton PC pour phpMyAdmin local
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # import BDD au 1er démarrage
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. PHP / Apache ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
    container_name: pairia-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html    # ton dossier site/ monté dans Apache
    environment:
      MYSQL_HOST: db             # ← nom du service, pas localhost
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commmerce
    depends_on:
      db:
        condition: service_healthy

  # ── 3. Python / FastAPI ─────────────────────────────────────────────────────
  api:
    build:
      context: ./ia
    container_name: pairia-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ia:/app         # code monté pour mise à jour sans rebuild
      - qdrant_data:/app/qdrant_db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commmerce
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # ── 4. Qdrant ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pairia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── 5. Ollama (LLM) ─────────────────────────────────────────────────────────
  # ⚠️  Par défaut : CPU uniquement.
  #     Pour GPU Nvidia, décommente le bloc "deploy" ci-dessous.
  ollama:
    image: ollama/ollama:latest
    container_name: pairia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama   # modèles persistants entre redémarrages
    # ── GPU Nvidia (décommenter si le datacenter a un GPU) ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]


volumes:
  mysql_data:
  qdrant_data:
  ollama_models:
